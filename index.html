<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Repair Gallery</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f4f6f8;margin:0;padding:40px}
h1{text-align:center;margin-bottom:40px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:25px}
.card{background:#fff;border-radius:12px;box-shadow:0 6px 18px rgba(0,0,0,0.08);overflow:hidden;transition:0.2s}
.card:hover{transform:translateY(-4px)}
.card img{width:100%;height:220px;object-fit:cover;cursor:pointer}
.card h3{padding:15px;margin:0;font-size:16px;text-align:center}
.lightbox{display:none;position:fixed;z-index:999;background:rgba(0,0,0,0.85);top:0;left:0;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column}
.lightbox img{max-width:90%;max-height:80%;margin-bottom:20px}
.controls{display:flex;gap:20px}
.controls button{padding:10px 18px;border:none;border-radius:6px;background:#fff;cursor:pointer;font-weight:bold}
.close{position:absolute;top:25px;right:40px;font-size:28px;color:#fff;cursor:pointer}
</style>
</head>
<body>

<h1>Battery Repair Gallery</h1>

<div class="grid">

<div class="card"><img src="Ego.jpg" onclick="openGallery(0,0)"><h3>EGO 56V 7.5Ah</h3></div>
<div class="card"><img src="Gtech.jpg" onclick="openGallery(1,0)"><h3>Gtech 48V</h3></div>
<div class="card"><img src="makita36V.jpg" onclick="openGallery(2,0)"><h3>Makita BL3626 36V</h3></div>
<div class="card"><img src="medical.jpg" onclick="openGallery(3,0)"><h3>Heartway Mobility</h3></div>
<div class="card"><img src="Stiga.jpg" onclick="openGallery(4,0)"><h3>Stiga BT20Li 18V</h3></div>
<div class="card"><img src="StihlAL.jpg" onclick="openGallery(5,0)"><h3>Stihl AS2 10.8V 2.6Ah</h3></div>
<div class="card"><img src="stihlAP100.jpg" onclick="openGallery(6,0)"><h3>Stihl AP100</h3></div>
<div class="card"><img src="stihlAP200.jpg" onclick="openGallery(7,0)"><h3>Stihl AP200</h3></div>
<div class="card"><img src="vonhaus20V.jpg" onclick="openGallery(8,0)"><h3>VonHaus G Series 20V 1.5Ah</h3></div>
<div class="card"><img src="vonhaus20V4ah.jpg" onclick="openGallery(9,0)"><h3>VonHaus G Series 20V 4Ah</h3></div>

</div>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeGallery()">&times;</span>
<img id="lightbox-img">
<div class="controls">
<button onclick="prevImage()">Prev</button>
<button onclick="nextImage()">Next</button>
</div>
</div>

<script>
const galleries = [
["Ego.jpg","Ego1.jpg","Ego2.jpg","Ego3.jpg"],
["Gtech.jpg","Gtech1.jpg","Gtech4.jpg","Gtech3.jpg"],
["makita36V.jpg","makita36V1.jpg","makita36V2.jpg","makita36V3.jpg","makita36V4.jpg"],
["medical.jpg","medical1.jpg","medical2.jpg","medical3.jpg"],
["Stiga.jpg","stiga1.jpg","stiga2.jpg","stiga3.jpg"],
["StihlAL.jpg","StihlAL1.jpg","StihlAL2.jpg","StihlAL3.jpg"],
["stihlAP100.jpg","stihlAP1001.jpg","stihlAP1002.jpg"],
["stihlAP200.jpg","stihlAP2001.jpg","stihlAP2003.jpg","stihlAP2004.jpg"],
["vonhaus20V.jpg","vonhaus20V1.jpg","vonhaus20V2.jpg","vonhaus20V3.jpg"],
["vonhaus20V4ah.jpg","vonhaus20V4ah1.jpg","vonhaus20V4ah2.jpg"]
];

let currentGallery = 0;
let currentIndex = 0;

function openGallery(galleryIndex, imageIndex){
currentGallery = galleryIndex;
currentIndex = imageIndex;
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightbox-img").src=galleries[currentGallery][currentIndex];
}

function closeGallery(){
document.getElementById("lightbox").style.display="none";
}

function nextImage(){
currentIndex=(currentIndex+1)%galleries[currentGallery].length;
document.getElementById("lightbox-img").src=galleries[currentGallery][currentIndex];
}

function prevImage(){
currentIndex=(currentIndex-1+galleries[currentGallery].length)%galleries[currentGallery].length;
document.getElementById("lightbox-img").src=galleries[currentGallery][currentIndex];
}
</script>

</body>
</html>
